<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <linearGradient id="ingG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c47ff"/>
      <stop offset="100%" stop-color="#4a2fcc"/>
    </linearGradient>
    <linearGradient id="retG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077a3"/>
    </linearGradient>
    <linearGradient id="genG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#028a64"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a5568"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c47ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#e2e8f0" letter-spacing="1">MULTIMODAL RAG — SYSTEM ARCHITECTURE</text>

  <!-- ─── INGESTION column ─── -->
  <rect x="20" y="55" width="190" height="340" rx="10" fill="#1e2235" stroke="#6c47ff" stroke-width="1.2" opacity="0.9"/>
  <rect x="20" y="55" width="190" height="32" rx="10" fill="url(#ingG)"/>
  <rect x="20" y="75" width="190" height="12" fill="url(#ingG)"/>
  <text x="115" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.5">INGESTION</text>

  <!-- Input boxes -->
  <rect x="34" y="100" width="162" height="36" rx="6" fill="#2a2f4a" stroke="#6c47ff" stroke-width="0.8"/>
  <text x="115" y="114" text-anchor="middle" font-size="10" fill="#a78bfa">📄 PDF</text>
  <text x="115" y="127" text-anchor="middle" font-size="9" fill="#8892a4">layout-aware + table bbox dedup</text>

  <rect x="34" y="145" width="162" height="36" rx="6" fill="#2a2f4a" stroke="#6c47ff" stroke-width="0.8"/>
  <text x="115" y="159" text-anchor="middle" font-size="10" fill="#a78bfa">🖼 Image</text>
  <text x="115" y="172" text-anchor="middle" font-size="9" fill="#8892a4">CLIP-ViT-B-32 + caption + OCR</text>

  <rect x="34" y="190" width="162" height="36" rx="6" fill="#2a2f4a" stroke="#6c47ff" stroke-width="0.8"/>
  <text x="115" y="204" text-anchor="middle" font-size="10" fill="#a78bfa">📊 CSV / TSV</text>
  <text x="115" y="217" text-anchor="middle" font-size="9" fill="#8892a4">tabular → Markdown</text>

  <!-- Chunking -->
  <rect x="34" y="242" width="162" height="42" rx="6" fill="#231e3d" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="115" y="258" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">Adaptive Chunking</text>
  <text x="115" y="271" text-anchor="middle" font-size="9" fill="#8892a4">narrative / procedural / table</text>
  <text x="115" y="282" text-anchor="middle" font-size="9" fill="#8892a4">factors + metadata</text>

  <!-- Embedding -->
  <rect x="34" y="300" width="162" height="42" rx="6" fill="#231e3d" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="115" y="316" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">Embedding Layer</text>
  <text x="115" y="329" text-anchor="middle" font-size="9" fill="#8892a4">text: OpenAI / hash fallback</text>
  <text x="115" y="340" text-anchor="middle" font-size="9" fill="#8892a4">image: CLIP-ViT-B-32</text>

  <!-- ─── STORAGE column ─── -->
  <rect x="230" y="55" width="160" height="200" rx="10" fill="#1e2235" stroke="#4a90d9" stroke-width="1.2" opacity="0.9"/>
  <rect x="230" y="55" width="160" height="32" rx="10" fill="#1a3a5c"/>
  <rect x="230" y="75" width="160" height="12" fill="#1a3a5c"/>
  <text x="310" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.5">STORAGE</text>

  <rect x="244" y="100" width="132" height="38" rx="6" fill="#1a2d4a" stroke="#4a90d9" stroke-width="0.8"/>
  <text x="310" y="116" text-anchor="middle" font-size="10" fill="#7ab3e0">Vector Store</text>
  <text x="310" y="129" text-anchor="middle" font-size="9" fill="#8892a4">FAISS / Qdrant</text>

  <rect x="244" y="148" width="132" height="38" rx="6" fill="#1a2d4a" stroke="#4a90d9" stroke-width="0.8"/>
  <text x="310" y="164" text-anchor="middle" font-size="10" fill="#7ab3e0">Lexical Index</text>
  <text x="310" y="177" text-anchor="middle" font-size="9" fill="#8892a4">BM25Okapi (JSON)</text>

  <rect x="244" y="196" width="132" height="38" rx="6" fill="#1a2d4a" stroke="#4a90d9" stroke-width="0.8"/>
  <text x="310" y="212" text-anchor="middle" font-size="10" fill="#7ab3e0">File Manifest</text>
  <text x="310" y="225" text-anchor="middle" font-size="9" fill="#8892a4">fingerprint dedup</text>

  <!-- ─── RETRIEVAL column ─── -->
  <rect x="410" y="55" width="190" height="340" rx="10" fill="#1e2235" stroke="#00b4d8" stroke-width="1.2" opacity="0.9"/>
  <rect x="410" y="55" width="190" height="32" rx="10" fill="url(#retG)"/>
  <rect x="410" y="75" width="190" height="12" fill="url(#retG)"/>
  <text x="505" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.5">RETRIEVAL</text>

  <rect x="424" y="100" width="162" height="36" rx="6" fill="#1a2f3a" stroke="#00b4d8" stroke-width="0.8"/>
  <text x="505" y="114" text-anchor="middle" font-size="10" fill="#67e8f9">Dense Retrieval</text>
  <text x="505" y="127" text-anchor="middle" font-size="9" fill="#8892a4">per-modality top-k (text / image / table)</text>

  <rect x="424" y="145" width="162" height="36" rx="6" fill="#1a2f3a" stroke="#00b4d8" stroke-width="0.8"/>
  <text x="505" y="159" text-anchor="middle" font-size="10" fill="#67e8f9">BM25 Lexical Retrieval</text>
  <text x="505" y="172" text-anchor="middle" font-size="9" fill="#8892a4">sparse token overlap</text>

  <rect x="424" y="190" width="162" height="36" rx="6" fill="#1a2f3a" stroke="#00b4d8" stroke-width="0.8"/>
  <text x="505" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#22d3ee">RRF Fusion</text>
  <text x="505" y="220" text-anchor="middle" font-size="9" fill="#8892a4">weighted reciprocal rank fusion</text>

  <rect x="424" y="235" width="162" height="36" rx="6" fill="#1a2f3a" stroke="#00b4d8" stroke-width="0.8"/>
  <text x="505" y="252" text-anchor="middle" font-size="10" fill="#67e8f9">Cross-Encoder Rerank</text>
  <text x="505" y="265" text-anchor="middle" font-size="9" fill="#8892a4">optional; ms-marco-MiniLM-L-6</text>

  <rect x="424" y="280" width="162" height="36" rx="6" fill="#1a2f3a" stroke="#00b4d8" stroke-width="0.8"/>
  <text x="505" y="297" text-anchor="middle" font-size="10" fill="#67e8f9">Result Diversity</text>
  <text x="505" y="310" text-anchor="middle" font-size="9" fill="#8892a4">Jaccard dedup + per-source cap</text>

  <rect x="424" y="325" width="162" height="36" rx="6" fill="#1a2f3a" stroke="#00b4d8" stroke-width="0.8"/>
  <text x="505" y="342" text-anchor="middle" font-size="10" fill="#67e8f9">Auto-Correction</text>
  <text x="505" y="355" text-anchor="middle" font-size="9" fill="#8892a4">widens search on low-quality hits</text>

  <!-- ─── GENERATION column ─── -->
  <rect x="620" y="55" width="260" height="340" rx="10" fill="#1e2235" stroke="#06d6a0" stroke-width="1.2" opacity="0.9"/>
  <rect x="620" y="55" width="260" height="32" rx="10" fill="url(#genG)"/>
  <rect x="620" y="75" width="260" height="12" fill="url(#genG)"/>
  <text x="750" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.5">GENERATION &amp; API</text>

  <rect x="634" y="100" width="232" height="36" rx="6" fill="#162b22" stroke="#06d6a0" stroke-width="0.8"/>
  <text x="750" y="114" text-anchor="middle" font-size="10" fill="#6ee7b7">Multi-LLM Synthesizer</text>
  <text x="750" y="127" text-anchor="middle" font-size="9" fill="#8892a4">OpenAI · Anthropic · Ollama · LlamaIndex</text>

  <rect x="634" y="145" width="232" height="36" rx="6" fill="#162b22" stroke="#06d6a0" stroke-width="0.8"/>
  <text x="750" y="159" text-anchor="middle" font-size="10" fill="#6ee7b7">SSE Token Streaming</text>
  <text x="750" y="172" text-anchor="middle" font-size="9" fill="#8892a4">real token stream for all providers</text>

  <rect x="634" y="190" width="232" height="36" rx="6" fill="#162b22" stroke="#06d6a0" stroke-width="0.8"/>
  <text x="750" y="207" text-anchor="middle" font-size="10" fill="#6ee7b7">Citation Builder</text>
  <text x="750" y="220" text-anchor="middle" font-size="9" fill="#8892a4">source · modality · page · excerpt</text>

  <rect x="634" y="235" width="232" height="36" rx="6" fill="#162b22" stroke="#06d6a0" stroke-width="0.8"/>
  <text x="750" y="252" text-anchor="middle" font-size="10" fill="#6ee7b7">Async Ingest Jobs</text>
  <text x="750" y="265" text-anchor="middle" font-size="9" fill="#8892a4">POST /ingest-files → job_id → GET status</text>

  <rect x="634" y="280" width="232" height="36" rx="6" fill="#162b22" stroke="#06d6a0" stroke-width="0.8"/>
  <text x="750" y="297" text-anchor="middle" font-size="10" fill="#6ee7b7">Per-Tenant Rate Limiting</text>
  <text x="750" y="310" text-anchor="middle" font-size="9" fill="#8892a4">sliding-window 429 · configurable RPM</text>

  <rect x="634" y="325" width="232" height="36" rx="6" fill="#162b22" stroke="#06d6a0" stroke-width="0.8"/>
  <text x="750" y="342" text-anchor="middle" font-size="10" fill="#6ee7b7">Multi-Tenant Auth</text>
  <text x="750" y="355" text-anchor="middle" font-size="9" fill="#8892a4">isolated collections · API-key scoping</text>

  <!-- ─── Arrows ─── -->
  <!-- Ingestion → Storage -->
  <line x1="210" y1="270" x2="230" y2="270" stroke="#6c47ff" stroke-width="1.5" marker-end="url(#arrB)"/>
  <!-- Storage → Retrieval -->
  <line x1="390" y1="160" x2="410" y2="160" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="390" y1="200" x2="410" y2="200" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Retrieval → Generation -->
  <line x1="600" y1="200" x2="620" y2="200" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── Query path label ─── -->
  <rect x="20" y="415" width="860" height="50" rx="8" fill="#1a1d2e" stroke="#374151" stroke-width="1"/>
  <text x="30" y="434" font-size="10" fill="#6b7280">QUERY PATH</text>
  <text x="30" y="454" font-size="9" fill="#9ca3af">User query → text/vision embed → dense + BM25 retrieval → RRF merge → optional rerank → diversity filter → auto-correct if low quality → LLM synthesize → SSE stream answer + citations</text>

  <!-- ─── Benchmark strip ─── -->
  <rect x="20" y="480" width="860" height="46" rx="8" fill="#1a1d2e" stroke="#374151" stroke-width="1"/>
  <text x="30" y="498" font-size="10" fill="#6b7280">BENCHMARKS (starter_eval.jsonl · FAISS CPU · hash embedder)</text>
  <rect x="30" y="504" width="160" height="16" rx="4" fill="#2a2f4a"/>
  <text x="110" y="516" text-anchor="middle" font-size="9" fill="#8892a4">Dense only  MRR 0.68</text>
  <rect x="200" y="504" width="160" height="16" rx="4" fill="#2a2f4a"/>
  <text x="280" y="516" text-anchor="middle" font-size="9" fill="#67e8f9">Hybrid+RRF  MRR 0.80</text>
  <rect x="370" y="504" width="200" height="16" rx="4" fill="#162b22"/>
  <text x="470" y="516" text-anchor="middle" font-size="9" fill="#6ee7b7">Hybrid+Rerank  MRR 0.92  ✓ best</text>
</svg>
